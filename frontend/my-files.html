<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Files - Secure File Hosting</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>Secure File Hosting</h1>
    <nav>
      <a href="/upload">Upload</a>
      <a href="/downloads">Downloads</a>
      <a href="/my-files">My Files</a>
      <button onclick="logout()">Logout</button>
    </nav>
  </header>

  <div class="container">
    <h2>My Files</h2>
    <p class="small-text">This page shows only the files uploaded by the current logged-in user.</p>

    <div id="messageBox" class="message"></div>

    <table>
      <thead>
        <tr>
          <th>Filename</th>
          <th>Size (KB)</th>
          <th>Uploaded At</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="myFilesTableBody">
        <tr>
          <td colspan="4" class="center-text">Loading your files...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>Beginner-friendly project for COSC2956</footer>

  <script src="/js/auth.js"></script>
  <script>
    requireLogin();
    loadMyFiles();

    async function loadMyFiles() {
      const response = await fetch("/api/my-files", {
        headers: authHeader()
      });

      const data = await response.json();
      const tableBody = document.getElementById("myFilesTableBody");

      if (!response.ok) {
        tableBody.innerHTML = '<tr><td colspan="4" class="center-text">Could not load your files.</td></tr>';
        showMessage("messageBox", data.message, "error");
        return;
      }

      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="center-text">You have not uploaded any files yet.</td></tr>';
        return;
      }

      tableBody.innerHTML = "";

      data.forEach(file => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${file.original_filename}</td>
          <td>${(file.size / 1024).toFixed(2)}</td>
          <td>${new Date(file.uploaded_at).toLocaleString()}</td>
          <td>
            <button class="action-btn delete-btn" onclick="deleteFile('${file._id}')">Delete</button>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    async function deleteFile(fileId) {
      const confirmed = confirm("Are you sure you want to delete this file?");
      if (!confirmed) {
        return;
      }

      const response = await fetch(`/api/files/${fileId}`, {
        method: "DELETE",
        headers: authHeader()
      });

      const data = await response.json();

      if (response.ok) {
        showMessage("messageBox", data.message, "success");
        loadMyFiles();
      } else {
        showMessage("messageBox", data.message, "error");
      }
    }
  </script>
</body>
</html>
