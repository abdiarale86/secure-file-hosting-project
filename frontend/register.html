<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Secure File Hosting</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>Secure File Hosting</h1>
    <nav>
      <a href="/register">Register</a>
      <a href="/login">Login</a>
    </nav>
  </header>

  <div class="container">
    <h2>Create Account</h2>
    <p class="small-text">Register with a unique username, email, and password.</p>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <button class="primary" onclick="registerUser()">Register</button>

    <div id="messageBox" class="message"></div>

    <p class="small-text">Already have an account? <a href="/login">Go to Login</a></p>
  </div>

  <footer>Beginner-friendly project for COSC2956</footer>

  <script src="/js/auth.js"></script>
  <script>
    async function registerUser() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !email || !password) {
        showMessage("messageBox", "Please fill in all fields.", "error");
        return;
      }

      const response = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showMessage("messageBox", data.message, "success");
        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
      } else {
        showMessage("messageBox", data.message, "error");
      }
    }
  </script>
</body>
</html>
